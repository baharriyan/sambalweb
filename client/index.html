<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5"
    />
    <title>Sambal Premium Artisanal | Cita Rasa Pedas Otentik Nusantara</title>
    <meta
      name="description"
      content="Nikmati kelezatan sambal artisanal premium yang dibuat dari cabai segar pilihan dan rempah rahasia. Homemade, tanpa pengawet, dan 100% Halal."
    />

    <!-- Preload LCP hero image for fastest render -->
    <link rel="preload" href="/attached_assets/hero.png" as="image" fetchpriority="high" />

    <!-- Resource Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://app.sandbox.midtrans.com" />

    <!-- Non-blocking Font Loading -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="preload"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Inline critical CSS for instant first paint -->
    <style>
      /* Prevent FOUC - show background immediately */
      body { background-color: #faf9f6; margin: 0; }
      #root { min-height: 100vh; }
      /* Minimal loading indicator in case JS takes time */
      .initial-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #faf9f6;
      }
      .initial-loader::after {
        content: '';
        width: 40px;
        height: 40px;
        border: 3px solid #fef2f2;
        border-top-color: #dc2626;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"><div class="initial-loader"></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
